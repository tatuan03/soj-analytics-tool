# Alembic configuration.
# NOTE: keep this file ASCII-only. Alembic reads it with the system locale
# encoding (cp1252 on Windows), so non-ASCII chars would crash on some machines.
#
# sqlalchemy.url is intentionally left EMPTY: the real URL is loaded at runtime
# from app.core.config.settings.DATABASE_URL inside alembic/env.py (single
# source of truth).

[alembic]
# Directory that holds migration scripts.
script_location = alembic

# Migration filename format: <date>_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Leave empty: env.py sets it from settings.DATABASE_URL
sqlalchemy.url =


[post_write_hooks]
# (Optional) enable black to auto-format generated migrations:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black


# ---- Logging ----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
