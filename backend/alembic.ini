# Cấu hình Alembic cho dự án.
# Lưu ý: sqlalchemy.url để TRỐNG có chủ đích — URL thật được nạp động từ
# app.core.config.settings.DATABASE_URL trong alembic/env.py (1 nguồn sự thật).

[alembic]
# Thư mục chứa script migration.
script_location = alembic

# Định dạng tên file migration: <ngày>_<rev>_<slug>.py cho dễ tra cứu.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Để trống: env.py sẽ tự set từ settings.DATABASE_URL
sqlalchemy.url =


[post_write_hooks]
# (Tùy chọn) Có thể bật black để tự format file migration sau khi sinh:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black


# ---- Logging ----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
